name: Bug Report
description: Something broken? Tell us.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below.

  - type: input
    id: icon
    attributes:
      label: Icon name
      placeholder: e.g. BellIcon
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      placeholder: |
        import { BellIcon } from 'liveicons/react'
        <BellIcon animate="loop" />
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: liveicons version
      placeholder: e.g. 0.1.0
    validations:
      required: true
